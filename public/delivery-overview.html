<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <title>Přehled dodávek</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="topbar">
    <div class="topbar-left">
        <h1>WMS Vulkán</h1>

        <nav class="main-nav">
            <a href="/index.html" data-permission="BOX_VIEW">Přehled beden</a>
            <a href="/receipt.html" data-permission="RECEIPT_CREATE">Sklad</a>
            <a href="/production-box.html" data-permission="PRODUCTION_VIEW">Výroba</a>
            <a href="/quality.html" data-permission="QUALITY_CHANGE">Kvalita</a>
            <a href="/delivery-overview.html" class="active-main-nav" data-permission="DELIVERY_CREATE">Dodávky</a>
            <a href="/history.html" data-permission="BOX_HISTORY_VIEW">Historie</a>
            <a href="/masterdata.html" data-permission="MASTERDATA_VIEW">Číselníky</a>
        </nav>
    </div>
</header>

<main class="container">
    <div class="tab-row">
    <button class="tab-btn active" onclick="window.location.href='/delivery-overview.html'">Přehled dodávek</button>
    </div>
    <section class="card">
        <div class="card-header">
            <h2>Přehled dodávek</h2>
            <span id="deliveryOverviewCount">Načítám...</span>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Dodávka</th>
                        <th>Destinace</th>
                        <th>Místo dodání</th>
                        <th>Jazyk</th>
                        <th>Počet beden</th>
                        <th>Stav</th>
                        <th>Vytvořeno</th>
                        <th>Akce</th>
                    </tr>
                </thead>
                <tbody id="deliveryOverviewBody">
                    <tr>
                        <td colspan="8">Načítám data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script src="auth-ui.js"></script>

<script>
    loadAuthUser().then(() => {
        requirePermission('DELIVERY_CREATE');
    });
</script>

<script src="delivery-overview.js"></script>
</body>
</html>
