<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <title>Detail bedny</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="topbar">
    <h1>WMS Vulkán</h1>
<nav class="main-nav">
    <a href="/index.html" class="active-main-nav" data-permission="BOX_VIEW">Přehled beden</a>
    <a href="/receipt.html" data-permission="RECEIPT_CREATE">Sklad</a>
    <a href="/production-box.html" data-permission="PRODUCTION_VIEW">Výroba</a>
    <a href="/quality.html" data-permission="QUALITY_CHANGE">Kvalita</a>
    <a href="/delivery-overview.html" data-permission="DELIVERY_CREATE">Dodávky</a>
    <a href="/history.html" data-permission="BOX_HISTORY_VIEW">Historie</a>
    <a href="/masterdata.html" data-permission="MASTERDATA_VIEW">Číselníky</a>
</nav>
</header>

<main class="container">
    <section class="card">
        <div class="card-header">
            <h2 id="boxTitle">Detail bedny</h2>
            <button class="btn btn-primary" onclick="printBoxLabel()">
                Tisk štítku
            </button>
            <a id="backBtn" class="btn btn-primary">Zpět</a>
        </div>

        <div class="detail-grid" id="boxDetail">
            Načítám...
        </div>
    </section>

    <section class="card" style="margin-top: 20px;">
        <div class="card-header">
            <h2>Historie bedny</h2>
            <span id="historyCount">Načítám...</span>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Datum</th>
                        <th>Pohyb</th>
                        <th>Odkud</th>
                        <th>Kam</th>
                        <th>Reference</th>
                        <th>Uživatel</th>
                        <th>ČK</th>
                        <th>Poznámka</th>
                    </tr>
                </thead>
                <tbody id="boxHistoryBody">
                    <tr>
                        <td colspan="8">Načítám data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script src="auth-ui.js"></script>

<script>
    loadAuthUser().then(() => {
        requirePermission('BOX_VIEW');
    });
</script>

<script src="box-detail.js"></script>
</body>
</html>
