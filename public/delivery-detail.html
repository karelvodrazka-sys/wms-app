<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <title>Detail dodávky</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="topbar">
    <div class="topbar-left">
        <h1>WMS Vulkán</h1>

        <nav class="main-nav">
            <a href="/index.html" data-permission="BOX_VIEW">Přehled beden</a>
            <a href="/receipt.html" data-permission="RECEIPT_CREATE">Sklad</a>
            <a href="/production-box.html" data-permission="PRODUCTION_VIEW">Výroba</a>
            <a href="/quality.html" data-permission="QUALITY_CHANGE">Kvalita</a>
            <a href="/delivery-overview.html" class="active-main-nav" data-permission="DELIVERY_CREATE">Dodávky</a>
            <a href="/history.html" data-permission="BOX_HISTORY_VIEW">Historie</a>
            <a href="/masterdata.html" data-permission="MASTERDATA_VIEW">Číselníky</a>
        </nav>
    </div>
</header>

<main class="container">

    <section class="card">
        <div class="card-header">
            <h2 id="deliveryTitle">Detail dodávky</h2>

            <button
                id="printDeliveryBtn"
                class="btn btn-primary"
            >
                Tisk dodacího listu
            </button>
        </div>

        <div id="deliveryInfo" class="detail-grid"></div>
    </section>

    <section class="card">
        <div class="card-header">
            <h2>Bedny v dodávce</h2>
            <span id="boxCount">0 beden</span>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Bedna</th>
                        <th>Položka</th>
                        <th>Šarže</th>
                        <th>Otisk</th>
                        <th>Zakázka</th>
                        <th>Počet ks</th>
                    </tr>
                </thead>

                <tbody id="deliveryBoxesBody">
                    <tr>
                        <td colspan="6">Načítám...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>

</main>

<script src="auth-ui.js"></script>

<script>
    loadAuthUser().then(() => {
        requirePermission('DELIVERY_CREATE');
    });
</script>

<script src="delivery-detail.js"></script>
</body>
</html>
