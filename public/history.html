<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <title>Historie</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header class="topbar">
    <div class="topbar-left">
        <h1>WMS Vulkán</h1>
        <nav class="main-nav">
            <a href="/index.html" data-permission="BOX_VIEW">Přehled beden</a>
            <a href="/receipt.html" data-permission="RECEIPT_CREATE">Sklad</a>
            <a href="/production-box.html" data-permission="PRODUCTION_VIEW">Výroba</a>
            <a href="/quality.html" data-permission="QUALITY_CHANGE">Kvalita</a>
            <a href="/delivery-overview.html" data-permission="DELIVERY_CREATE">Dodávky</a>
            <a href="/history.html" class="active-main-nav" data-permission="BOX_HISTORY_VIEW">Historie</a>
            <a href="/masterdata.html" data-permission="MASTERDATA_VIEW">Číselníky</a>
        </nav>
    
    </div>

</header>

<main class="container">
    <section class="panel">
        <div class="toolbar-row toolbar-space-between">
    <div></div>

    <div class="toolbar-actions">
        <button class="btn" onclick="clearHistoryFilters()">Vyčistit filtry</button>
        <button class="btn btn-primary" onclick="exportHistory()">Export CSV</button>
    </div>
    </div>
    </section>

    <section class="card">
        <div class="card-header">
            <h2>Historie pohybů</h2>
            <span id="historyCount">Načítám...</span>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Datum</th>
                        <th>Bedna</th>
                        <th>PN</th>
                        <th>Šarže</th>
                        <th>Cavity</th>
                        <th>Zakázka</th>
                        <th>Ks</th>
                        <th>Pohyb</th>
                        <th>Odkud</th>
                        <th>Kam</th>
                        <th>Dodávka</th>
                        <th>Destinace</th>
                        <th>Obsahový stav</th>
                        <th>Logistický stav</th>
                        <th>Kvalitativní stav</th>
                        <th>Číslo ČK</th>
                        <th>Uživatel</th>
                        <th>Poznámka</th>
                    </tr>
                    <tr class="column-filter-row">
                        <th><input class="column-filter" data-field="DoneAt" placeholder="filtr" /></th>
                        <th><input class="column-filter" data-field="BoxNumber" placeholder="00001;00002" /></th>
                        <th><input class="column-filter" data-field="PartNumber" placeholder="PN1;PN2" /></th>
                        <th><input class="column-filter" data-field="Batch" placeholder="filtr" /></th>
                        <th><input class="column-filter" data-field="Cavity" placeholder="filtr" /></th>
                        <th><input class="column-filter" data-field="OrderNumber" placeholder="filtr" /></th>
                        <th><input class="column-filter" data-field="Quantity" placeholder="filtr" /></th>
                        <th><input class="column-filter" data-field="MovementTypeName" placeholder="filtr" /></th>
                        <th><input class="column-filter" data-field="FromLocationCode" placeholder="filtr" /></th>
                        <th><input class="column-filter" data-field="ToLocationCode" placeholder="filtr" /></th>
                        <th><input class="column-filter" data-field="DeliveryNumber" placeholder="filtr" /></th>
                        <th><input class="column-filter" data-field="DeliveryDestination" placeholder="filtr" /></th>
                        <th><input class="column-filter" data-field="BoxContentStatus" placeholder="filtr" /></th>
                        <th><input class="column-filter" data-field="CurrentLogisticStatus" placeholder="filtr" /></th>
                        <th><input class="column-filter" data-field="CurrentQualityStatus" placeholder="filtr" /></th>
                        <th><input class="column-filter" data-field="CurrentRedCardNumber" placeholder="filtr" /></th>
                        <th><input class="column-filter" data-field="Username" placeholder="filtr" /></th>
                        <th><input class="column-filter" data-field="Note" placeholder="filtr" /></th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <tr>
                        <td colspan="18">Načítám data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script src="auth-ui.js"></script>

<script>
    loadAuthUser().then(() => {
        requirePermission('BOX_HISTORY_VIEW');
    });
</script>

<script src="history.js"></script>
</body>
</html>
