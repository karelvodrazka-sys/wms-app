<!DOCTYPE html> 
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <title>Příjem</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="topbar">
    <div class="topbar-left">
        <h1>WMS Vulkán</h1>

        <nav class="main-nav">
            <a href="/index.html" data-permission="BOX_VIEW">Přehled beden</a>
            <a href="/receipt.html" class="active-main-nav" data-permission="RECEIPT_CREATE">Sklad</a>
            <a href="/production-box.html" data-permission="PRODUCTION_VIEW">Výroba</a>
            <a href="/quality.html" data-permission="QUALITY_CHANGE">Kvalita</a>
            <a href="/delivery-overview.html" data-permission="DELIVERY_CREATE">Dodávky</a>
            <a href="/history.html" data-permission="BOX_HISTORY_VIEW">Historie</a>
            <a href="/masterdata.html" data-permission="MASTERDATA_VIEW">Číselníky</a>
        </nav>
    </div>
</header>

<main class="container">

    <div class="tab-row">
    <button class="tab-btn active" onclick="window.location.href='/receipt.html'">Příjem</button>
    <button class="tab-btn" onclick="window.location.href='/putaway.html'">Zaskladnění</button>
    <button class="tab-btn" onclick="window.location.href='/transfer.html'">Přeskladnění</button>
    <button class="tab-btn" onclick="window.location.href='/delivery.html'">Výdej</button>
    </div>

    <div class="view-switch">
        <button id="btnExisting" class="btn btn-primary">Příjem existující</button>
        <button id="btnNew" class="btn">Nová bedna</button>
    </div>

    <section id="existingView" class="card">
        <div class="card-header">
            <h2>Příjem již existující bedny</h2>
        </div>

        <div class="form">
            <div class="toolbar-row">
                <input id="returnBoxNumber" placeholder="Číslo bedny (scan / ručně)" />
                <button class="btn btn-primary" onclick="loadReturnBox()">Načíst bednu</button>

                <input id="deliveryNumber" placeholder="Číslo dodávky (DL...)" />
                <button class="btn btn-primary" onclick="loadDelivery()">Načíst dodávku</button>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Bedna</th>
                            <th>PN</th>
                            <th>Šarže</th>
                            <th>Cavity</th>
                            <th>Zakázka</th>
                            <th>Ks</th>
                        </tr>
                    </thead>
                    <tbody id="existingBoxesBody">
                        <tr>
                            <td colspan="6">Zatím nejsou načtené žádné bedny.</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <button class="btn btn-primary" onclick="prepareExistingBoxesForPutaway()">
                Připravit k zaskladnění
            </button>

            <p id="existingResult"></p>
        </div>
    </section>

    <section id="newBoxView" class="card" style="margin-top: 20px; display: none;">
        <div class="card-header">
            <h2>Vytvoření nové bedny</h2>
        </div>

        <div class="form new-box-form">

        <div class="form-grid-2">
            <div>
                <label>Zakázka</label>
                <input id="orderNumber" placeholder="Naskenuj zakázku" />
            </div>

            <div>
                <label>Položka</label>
                <input id="partNumberScan" placeholder="Naskenuj položku" />
                <select id="partNumberSelect" style="display: none;">
                    <option value="">Načítám položky...</option>
                </select>
            </div>

            <div>
                <label>Šarže</label>
                <input id="batch" placeholder="Naskenuj šarži" />
            </div>
        </div>
            <div class="date-row">
            <div class="date-input-wrap">
                <label>Otisk</label>
                <input id="cavity" placeholder="Otisk" value="1" readonly />
            </div>

            <div id="cavityButtons" class="date-buttons"></div>
            </div>

            <div class="date-row">
                <div class="date-input-wrap">
                    <label>Datum lití</label>
                    <input id="castingDate" type="date" />
                </div>

                <div id="dateButtons" class="date-buttons"></div>
            </div>

            <div class="form-grid-3">
                <div>
                    <label>Počet ks</label>
                    <input id="quantity" placeholder="Počet ks" />
                </div>

                <div>
                    <label>Obsahový stav</label>
                    <select id="boxContentStatusId">
                        <option value="3">Odlitek</option>
                        <option value="1">WIP apretace</option>
                        <option value="2">WIP obrobna</option>
                    </select>
                </div>

                <div>
                    <label>Kvalitativní stav</label>
                    <select id="boxQualityStatusId">
                        <option value="1">Volná</option>
                        <option value="2">Červená karta</option>
                        <option value="3">3D</option>
                        <option value="4">Před impregnací</option>
                        <option value="5">Po impregnaci</option>
                    </select>
                </div>
            </div>

            <div>
                <label>Číslo červené karty</label>
                <input id="redCardNumber" placeholder="Číslo červené karty (nepovinné)" />
            </div>

            <button onclick="createBox()" class="btn btn-primary create-box-btn">
                Vytvořit bednu
            </button>

            <p id="result"></p>
        </div>
    </section>

</main>

<script src="auth-ui.js"></script>

<script>
    loadAuthUser().then(() => {
        requirePermission('RECEIPT_CREATE');
    });
</script>

<script src="receipt.js"></script>
</body>
</html>
