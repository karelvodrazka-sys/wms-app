<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <title>Přeskladnění</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="topbar">
    <div class="topbar-left">
        <h1>WMS Vulkán</h1>

        <nav class="main-nav">
            <a href="/index.html">Přehled beden</a>
            <a href="/receipt.html" class="active-main-nav">Sklad</a>
            <a href="/production-box.html">Výroba</a>
            <a href="/quality.html">Kvalita</a>
            <a href="/delivery-overview.html">Dodávky</a>
            <a href="/history.html">Historie</a>
            <a href="/masterdata.html">Číselníky</a>
        </nav>
    </div>
</header>

<main class="container">

    <div class="tab-row">
    <button class="tab-btn" onclick="window.location.href='/receipt.html'">Příjem</button>
    <button class="tab-btn" onclick="window.location.href='/putaway.html'">Zaskladnění</button>
    <button class="tab-btn active" onclick="window.location.href='/transfer.html'">Přeskladnění</button>
    <button class="tab-btn" onclick="window.location.href='/delivery.html'">Výdej</button>
    </div>

    <section class="panel">
        <div class="toolbar-row">
            <button class="btn btn-primary" onclick="loadPendingTransfers()">Obnovit</button>
            <button class="btn btn-primary" onclick="confirmSelectedTransfers()">Potvrdit vybrané přeskladnění</button>
        </div>
    </section>

    <section class="card">
        <div class="card-header">
            <h2>Bedny čekající na dokončení přeskladnění</h2>
            <span id="transferCount">Načítám...</span>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th><input type="checkbox" onclick="toggleAllTransfers(this)" /></th>
                        <th>Bedna</th>
                        <th>PN</th>
                        <th>Šarže</th>
                        <th>Cavity</th>
                        <th>Ks</th>
                        <th>Aktuální lokace</th>
                        <th>Cílová lokace</th>
                        <th>Změnit lokaci</th>
                        <th>Zrušit</th>
                    </tr>
                </thead>
                <tbody id="transferTableBody">
                    <tr>
                        <td colspan="10">Načítám data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script src="transfer.js"></script>
</body>
</html>
