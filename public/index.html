<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WMS Vulkán</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header class="topbar">
    <div class="topbar-left">
        <h1>WMS Vulkán</h1>

    <nav class="main-nav">
        <a href="/" class="active-main-nav" data-permission="BOX_VIEW">Přehled beden</a>
        <a href="/receipt.html" data-permission="RECEIPT_CREATE">Sklad</a>
        <a href="/production-box.html" data-permission="PRODUCTION_VIEW">Výroba</a>
        <a href="/quality.html" data-permission="QUALITY_CHANGE">Kvalita</a>
        <a href="/delivery-overview.html" data-permission="DELIVERY_CREATE">Dodávky</a>
        <a href="/history.html" data-permission="BOX_HISTORY_VIEW">Historie</a>
        <a href="/masterdata.html" data-permission="MASTERDATA_VIEW">Číselníky</a>
    </nav>

    </div>

    <div class="topbar-right">
        <span id="userInfo"></span>
    </div>
        </header>

    <main class="container">
        <section class="panel">
            <div class="toolbar-row toolbar-space-between">
                <div></div>

                <div class="toolbar-actions">
                    <button class="btn" onclick="clearBoxFilters()">Vyčistit filtry</button>
                    <button class="btn btn-primary" onclick="window.location.href='/boxes/export'">Export CSV</button>
                </div>
            </div>

            <div class="action-row">
                <button onclick="printPickingList()" class="btn btn-primary">
                    Tisk vychystávacího seznamu
                </button>

                <button id="transferBtn" onclick="transferSelected()" class="btn btn-primary">
                    Přeskladnit vybrané
                </button>
            </div>
        </section>

        <section class="card">
            <div class="card-header">
                <h2>Seznam beden</h2>
                <span id="boxCount">Načítám...</span>
            </div>

            <div class="table-wrapper">
                <table id="boxesTable">
                    <thead>
                        <tr>
                            <th>
                                <input type="checkbox" onclick="toggleAll(this)" />
                            </th>
                            <th>Bedna</th>
                            <th>PN</th>
                            <th>Šarže</th>
                            <th>Otisk</th>
                            <th>Zakázka</th>
                            <th>Ks</th>
                            <th>Obsahový stav</th>
                            <th>Logistický stav</th>
                            <th>Kvalitativní stav</th>
                            <th>Číslo ČK</th>
                            <th>Sklad</th>
                            <th>Lokace</th>
                        </tr>
                        <tr class="column-filter-row">
                        <th></th>
                        <th><input class="column-filter" data-field="BoxNumber" placeholder="00001;00002" /></th>
                        <th><input class="column-filter" data-field="PartNumber" placeholder="PN1;PN2" /></th>
                        <th><input class="column-filter" data-field="Batch" placeholder="03-11;05-22" /></th>
                        <th><input class="column-filter" data-field="Cavity" placeholder="1;2" /></th>
                        <th><input class="column-filter" data-field="OrderNumber" placeholder="zakázka" /></th>
                        <th><input class="column-filter" data-field="Quantity" placeholder="ks" /></th>
                        <th><input class="column-filter" data-field="BoxContentStatus" placeholder="obsah" /></th>
                        <th><input class="column-filter" data-field="BoxLogisticStatus" placeholder="logistika" /></th>
                        <th><input class="column-filter" data-field="BoxQualityStatus" placeholder="kvalita" /></th>
                        <th><input class="column-filter" data-field="RedCardNumber" placeholder="ČK" /></th>
                        <th><input class="column-filter" data-field="WarehouseName" placeholder="sklad" /></th>
                        <th><input class="column-filter" data-field="LocationCode" placeholder="lokace" /></th>
                    </tr>
                    </thead>
                    <tbody id="boxesTableBody">
                        <tr>
                            <td colspan="13">Načítám data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

<script src="auth-ui.js"></script>

<script>
    loadAuthUser().then(() => {
        requirePermission('BOX_VIEW');
    });
</script>

    <script src="app.js"></script>
</body>
</html>
